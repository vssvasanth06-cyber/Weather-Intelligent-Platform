<!DOCTYPE html>
<html>
<head>
    <title>Weather Intelligence Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Weather Intelligence Platform</h1>

    <div class="dashboard">

        <div class="card">
            <h2>Temperature</h2>
            <p id="temperature">--</p>
        </div>

        <div class="card">
            <h2>Humidity</h2>
            <p id="humidity">--</p>
        </div>

        <div class="card">
            <h2>Pressure</h2>
            <p id="pressure">--</p>
        </div>

        <div class="card">
            <h2>Rainfall</h2>
            <p id="rainfall">--</p>
        </div>

        <div class="card">
            <h2>Wind Speed</h2>
            <p id="wind_speed">--</p>
        </div>

    </div>

    <script src="dashboard.js"></script>

</body>
</html>
